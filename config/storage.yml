test:
  service: Disk
  root: <%= Rails.root.join("tmp/storage") %>

local:
  service: Disk
  root: <%= Rails.root.join("storage") %>

development:
  service: Disk
  root: <%= Rails.root.join("storage") %>

# S3 service used by both production and any blob with service_name = 'amazon_dev'
# in the database (most existing records). Credentials fall through to the
# AWS SDK default credential chain (env vars → ~/.aws/credentials → instance role)
# when AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY are not set.
production: &amazon
  service: S3
  <% if ENV['AWS_ACCESS_KEY_ID'].present? %>
  access_key_id: <%= ENV['AWS_ACCESS_KEY_ID'] %>
  secret_access_key: <%= ENV['AWS_SECRET_ACCESS_KEY'] %>
  <% end %>
  region: <%= ENV.fetch('AWS_REGION', 'us-east-1') %>
  bucket: <%= ENV.fetch('AWS_S3_BUCKET', 'auteurflix-prod') %>

amazon_dev:
  <<: *amazon
