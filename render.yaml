databases:
  - name: auteurflix-db
    plan: free
    databaseName: auteurflix
    user: auteurflix

services:
  - type: web
    name: auteurflix
    runtime: ruby
    plan: free
    buildCommand: |
      bundle install &&
      npm install &&
      rm -rf tmp/cache/assets public/assets/.sprockets-manifest-* public/assets/application-* &&
      bundle exec rails assets:precompile &&
      bundle exec rails db:migrate &&
      bundle exec rails db:seed &&
      bundle exec rails tmdb:sync_if_configured
    startCommand: bundle exec puma -C config/puma.rb
    envVars:
      - key: RAILS_ENV
        value: production
      - key: RAILS_SERVE_STATIC_FILES
        value: "true"
      - key: RAILS_LOG_TO_STDOUT
        value: "true"
      - key: SECRET_KEY_BASE
        generateValue: true
      - key: TMDB_API_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: auteurflix-db
          property: connectionString
