# DATABASE_URL is now provided by Neon (https://console.neon.tech).
# To rebind to a different database, change the value in the Render
# dashboard's web-service Environment tab. Render no longer manages
# the database; the previous Render-provisioned auteurflix-db is
# expiring on its own and is no longer referenced.

services:
  - type: web
    name: auteurflix
    runtime: ruby
    plan: free
    buildCommand: |
      bundle install &&
      npm install &&
      rm -rf tmp/cache/assets public/assets/.sprockets-manifest-* public/assets/application-* &&
      bundle exec rails assets:precompile &&
      bundle exec rails db:migrate &&
      bundle exec rails db:seed &&
      bundle exec rails tmdb:sync_if_configured
    startCommand: bundle exec puma -C config/puma.rb
    envVars:
      - key: RAILS_ENV
        value: production
      - key: RAILS_SERVE_STATIC_FILES
        value: "true"
      - key: RAILS_LOG_TO_STDOUT
        value: "true"
      - key: SECRET_KEY_BASE
        generateValue: true
      - key: TMDB_API_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
