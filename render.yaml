databases:
  - name: auteurflix-db
    plan: free
    databaseName: auteurflix
    user: auteurflix

services:
  - type: web
    name: auteurflix
    runtime: ruby
    plan: free
    buildCommand: |
      bundle install &&
      npm install &&
      npm run build &&
      bundle exec rails db:migrate
    startCommand: bundle exec puma -C config/puma.rb
    envVars:
      - key: RAILS_ENV
        value: production
      - key: RAILS_SERVE_STATIC_FILES
        value: "true"
      - key: RAILS_LOG_TO_STDOUT
        value: "true"
      - key: SECRET_KEY_BASE
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: auteurflix-db
          property: connectionString
